<!-- PAGINA DE LOGIN --> 
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="wicnitial-scale=1.0">
    <title>Evento Eventoso</title>
</head>
<body>
    <h1>Gerenciador de Eventos</h1>
    <h2>Login</h2>
    <form action="/login" method="post">

    <div>
        <label for="username">Usuário:</label>
        <input type="text" id="username" placeholder="usuário">
    </div>
    <br>
    <div> 
        <label for="password">Senha:</label>
        <input type="password" id="password" placeholder="senha"></input>
    </div>
    <br>
    <button onclick="Login()">Entrar</button>
    

    <!-- VALIDADOR DE SENHA -->
    <script>
        function Login() {
            event.preventDefault();

            const username =
            document.getElementById("username").value;
            const password =
            document.getElementById("password").value;

            const usuarioCorreto = "admin";
            const senhaCorreta = "0000s";

            if (username === usuarioCorreto && password === senhaCorreta) {
                window.location.href ="/initial.html";
            } else {
                alert("TA ERRADO!");

    
        }
    }


    </script>

</body>
</html>
